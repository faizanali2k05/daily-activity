name: Daily Commits
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          COUNT=$(( RANDOM % 2 + 10 ))
          for i in $(seq 1 $COUNT); do
            echo "$(date +%s%N) run $i" >> activity.log
            git add activity.log
            git commit -m "chore: update activity log ($i)"
          done

          git push
